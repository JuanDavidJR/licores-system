{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestion - Licores</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="header-brand">
                <div class="header-title">
                    <span>Sistema de Gestion</span>
                    <span>Licores</span>
                </div>
            </div>
            <nav>
                <a href="{% url 'mesas' %}" {% if request.resolver_match.url_name == 'mesas' %}class="active"{% endif %}>Mesas</a>
                <a href="{% url 'inventario' %}" {% if request.resolver_match.url_name == 'inventario' %}class="active"{% endif %}>Inventario</a>
                <a href="{% url 'ventas' %}" {% if request.resolver_match.url_name == 'ventas' %}class="active"{% endif %}>Ventas</a>
            </nav>
        </div>
    </header>
    <main>
        {% block content %}
        {% endblock %}
    </main>
    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
